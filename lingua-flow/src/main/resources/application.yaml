spring:
  datasource:
    url: jdbc:postgresql://localhost:5440/linguaflow
    username: lingua_user
    password: lingua_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: false
  flyway:
    enabled: false


